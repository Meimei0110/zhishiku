<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莓莓知识库引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            safelist: [
                'bg-rose-500/10', 'bg-rose-500', 'border-rose-500/20', 'text-rose-400',
                'bg-purple-500/10', 'bg-purple-500', 'border-purple-500/20', 'text-purple-400',
                'bg-cyan-500/10', 'bg-cyan-500', 'border-cyan-500/20', 'text-cyan-400',
                'group-hover:bg-rose-500', 'group-hover:bg-purple-500', 'group-hover:bg-cyan-500'
            ]
        };
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'><path d='M128 232C80 192 48 144 48 96C48 68 72 48 104 48H152C184 48 208 68 208 96C208 144 176 192 128 232Z' fill='%23f43f5e'/><path d='M104 48C96 28 76 20 64 16' stroke='%2322c55e' stroke-width='14' fill='none' stroke-linecap='round'/><path d='M152 48C160 28 180 20 192 16' stroke='%2322c55e' stroke-width='14' fill='none' stroke-linecap='round'/><path d='M128 48L128 12' stroke='%2322c55e' stroke-width='14' fill='none' stroke-linecap='round'/><circle cx='112' cy='108' r='5' fill='white' opacity='.4'/><circle cx='144' cy='108' r='5' fill='white' opacity='.4'/><circle cx='128' cy='140' r='5' fill='white' opacity='.4'/><circle cx='128' cy='180' r='5' fill='white' opacity='.4'/></svg>">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-height: 640px) {
            body { overflow-y: hidden; height: 100vh; }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .ai-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: rgba(99, 102, 241, 0.5);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .status-dot {
            animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes quote-in {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes quote-out {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-8px) scale(0.97); }
        }
        .quote-enter { animation: quote-in 0.6s ease-out forwards; }
        .quote-exit { animation: quote-out 0.4s ease-in forwards; }

        .quote-box {
            position: relative;
            transition: all 0.4s ease;
        }
        .quote-box::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1), rgba(6,182,212,0.15));
            z-index: -1;
            opacity: 0.5;
            transition: opacity 0.4s ease;
        }
        .quote-box:hover::before {
            opacity: 1;
        }
        .quote-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(99,102,241,0.15), 0 0 60px rgba(168,85,247,0.05);
        }
        .quote-box:hover .quote-text {
            color: #e2e8f0;
        }
        .quote-box:hover .quote-mark {
            color: rgba(129,140,248,0.5);
        }

        .ai-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: none;
        }
        .ai-card:hover::after {
            left: 150%;
            transition: left 0.6s ease;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        @keyframes berry-bounce {
            0% { transform: rotate(0) scale(1); }
            20% { transform: rotate(-8deg) scale(1.15); }
            40% { transform: rotate(6deg) scale(1.1); }
            60% { transform: rotate(-3deg) scale(1.05); }
            80% { transform: rotate(1deg) scale(1.02); }
            100% { transform: rotate(0) scale(1); }
        }
        @keyframes berry-pulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.25); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .header-icon {
            animation: breathe 3s ease-in-out infinite;
            cursor: pointer;
        }
        .header-icon:hover {
            animation: berry-bounce 0.7s ease forwards;
        }
        .header-icon.pulse {
            animation: berry-pulse 0.5s ease forwards;
        }

        @keyframes page-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes card-slide-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body.loading > *:not(canvas):not(.bg-grid):not(.glow-orb):not(#particle-canvas) {
            opacity: 0;
        }
        body.ready {
            animation: page-in 0.5s ease-out forwards;
        }
        .card-enter {
            animation: card-slide-in 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10px, -10px) scale(1.05); }
            66% { transform: translate(-5px, 8px) scale(0.98); }
        }
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
            animation: float 12s ease-in-out infinite;
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .glow-orb { display: none; }
            .quote-box { padding: 0.75rem 1rem; min-height: 52px !important; }
            .quote-box:hover { transform: none; }
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center p-3 relative loading">

    <canvas id="particle-canvas"></canvas>
    <div class="bg-grid"></div>
    <div class="glow-orb" style="width:300px;height:300px;top:10%;left:-5%;background:rgba(99,102,241,0.08);animation-delay:0s;"></div>
    <div class="glow-orb" style="width:250px;height:250px;bottom:15%;right:-5%;background:rgba(168,85,247,0.06);animation-delay:-4s;"></div>
    <div class="glow-orb" style="width:200px;height:200px;top:50%;left:40%;background:rgba(6,182,212,0.05);animation-delay:-8s;"></div>

    <header class="text-center mb-3 sm:mb-6 w-full max-w-4xl relative z-10 mt-2 sm:mt-4">
        <div id="berry-icon" class="header-icon inline-flex items-center justify-center p-2 bg-indigo-500/10 rounded-2xl mb-2 border border-indigo-500/20 text-indigo-400">
            <svg width="1.5em" height="1.5em" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
                <path d="M128 232 C80 192 48 144 48 96 C48 68 72 48 104 48 L152 48 C184 48 208 68 208 96 C208 144 176 192 128 232Z"/>
                <path d="M104 48 C96 28 76 20 64 16"/><path d="M152 48 C160 28 180 20 192 16"/><path d="M128 48 L128 12"/>
                <circle cx="112" cy="108" r="6" fill="currentColor" stroke="none"/>
                <circle cx="144" cy="108" r="6" fill="currentColor" stroke="none"/>
                <circle cx="128" cy="140" r="6" fill="currentColor" stroke="none"/>
                <circle cx="104" cy="156" r="6" fill="currentColor" stroke="none"/>
                <circle cx="152" cy="156" r="6" fill="currentColor" stroke="none"/>
                <circle cx="128" cy="188" r="6" fill="currentColor" stroke="none"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-1 tracking-tight text-white">
            莓莓知识库中枢
        </h1>
        <div id="config-badge" class="hidden inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[9px] uppercase tracking-widest">
            <i class="ph ph-check-circle"></i> 动态链接已加载
        </div>
    </header>

    <div id="quote-container" class="quote-box glass-panel w-full max-w-md relative z-10 px-4 sm:px-6 py-3 sm:py-4 mb-3 sm:mb-5 mx-2 rounded-2xl cursor-default" style="min-height: 56px;">
        <div class="flex items-start gap-2">
            <span class="quote-mark text-indigo-400/30 text-2xl leading-none select-none font-serif shrink-0">"</span>
            <div class="flex-grow text-center pt-0.5">
                <p id="quote" class="quote-text text-[13px] text-slate-400 italic tracking-wide leading-relaxed transition-colors duration-300 quote-enter"></p>
            </div>
            <span class="quote-mark text-indigo-400/30 text-2xl leading-none select-none font-serif self-end shrink-0">"</span>
        </div>
    </div>

    <main id="card-container" class="w-full max-w-md flex flex-col gap-2 sm:gap-3 relative z-10 px-2"></main>

    <footer class="fixed bottom-2 sm:bottom-3 left-0 right-0 text-center z-10">
        <p class="text-[10px] text-slate-600 tracking-wider">Stay hungry, stay foolish. Build something people love.</p>
    </footer>

    <script>
        function createCard(id, { name, url, updatedAt, icon, color }) {
            const isActive = url && (url.startsWith('http') || url.startsWith('./'));
            const card = document.createElement('a');
            card.href = isActive ? url : 'javascript:void(0)';
            card.target = '_blank';
            card.className = 'ai-card glass-panel rounded-xl p-5 group flex items-center gap-4';

            if (!isActive) {
                card.addEventListener('click', () => alert(`「${name}」的知识库链接尚未配置`));
            }

            const dotClass = isActive
                ? `w-1.5 h-1.5 rounded-full bg-${color}-500 status-dot`
                : 'w-1.5 h-1.5 rounded-full bg-slate-600';
            const statusText = isActive ? 'Active / Ready' : 'Offline';
            const statusColor = isActive ? 'text-emerald-400' : 'text-slate-500';
            const timeInfo = isActive && updatedAt
                ? `<span class="text-[9px] text-slate-500 ml-1.5">${updatedAt}</span>`
                : '';

            card.innerHTML = `
                <div class="p-3 bg-${color}-500/10 rounded-lg border border-${color}-500/20 text-${color}-400 group-hover:bg-${color}-500 group-hover:text-white transition-all">
                    <i class="ph ${icon} text-xl"></i>
                </div>
                <div class="flex-grow">
                    <h2 class="font-bold text-white text-lg">${name}</h2>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="${dotClass}"></span>
                        <span class="text-[10px] ${statusColor} font-mono uppercase tracking-tighter">${statusText}</span>
                        ${timeInfo}
                    </div>
                </div>
                <i class="ph ph-caret-right text-slate-600 group-hover:text-white transition-colors"></i>`;

            return card;
        }

        const quotes = [
            '做正确的事，而非容易的事。',
            '好的产品，源于对用户痛点的深刻共情。',
            '每一次迭代，都是离完美更近一步。',
            '先解决问题，再追求优雅。',
            '用户不会告诉你他想要什么，但会告诉你他讨厌什么。',
            '数据驱动决策，直觉驱动方向。',
            '最小可行产品不是最差产品，而是最聪明的起点。',
            '需求的背后是场景，场景的背后是人。',
            '把复杂留给自己，把简单留给用户。',
            '不要爱上你的解决方案，要爱上你的问题。',
            '所有伟大的产品，都始于一个大胆的假设。',
            '快速试错，比完美计划更有价值。',
            '真正的创新，是让人们觉得理所当然。',
            '永远保持好奇心，它是一切创造的起点。',
            '今天的不可能，是明天的理所当然。',
            '比竞争对手更了解用户，就是最大的护城河。',
            '优秀是一种习惯，而非一次行为。 -- 亚里士多德',
            '种一棵树最好的时间是十年前，其次是现在。',
            '凡不能毁灭我的，必使我强大。 -- 尼采',
            '知行合一，方为真知。 -- 王阳明',
            '你比你想象的更强大，比你以为的更勇敢。',
            '每一个优秀的人，都有一段沉默的时光。',
            '不怕慢，就怕站；不怕难，就怕懒。',
            '你现在的努力，是未来的你会感谢的。',
            '成长的路上没有捷径，但每一步都算数。',
            '把焦虑变成行动，把迷茫变成方向。',
            '能扛事，是成年人最了不起的能力。',
            '没有白走的路，每一步都是积累。',
            '与其担心未来，不如现在好好努力。',
            '保持热爱，奔赴山海。',
            '你不是在浪费时间，你是在积蓄力量。',
            '所有的光芒，都需要时间才能被看到。',
            '低谷是蓄力，沉淀是升华。',
            '世界会奖励那些认真且坚持的人。',
            '别急，你正在成为更好的自己。'
        ];

        function startQuoteCarousel() {
            const el = document.getElementById('quote');
            const box = document.getElementById('quote-container');
            let idx = Math.floor(Math.random() * quotes.length);
            let paused = false;
            el.textContent = quotes[idx];

            box.addEventListener('mouseenter', () => { paused = true; });
            box.addEventListener('mouseleave', () => { paused = false; });

            setInterval(() => {
                if (paused) return;
                el.classList.remove('quote-enter');
                el.classList.add('quote-exit');
                setTimeout(() => {
                    idx = (idx + 1) % quotes.length;
                    el.textContent = quotes[idx];
                    el.classList.remove('quote-exit');
                    el.classList.add('quote-enter');
                }, 400);
            }, 5000);
        }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let berries = [];
            let mouse = { x: -100, y: -100 };
            let glowPos = { x: -100, y: -100 };
            const LINK_DIST = 120;
            const sparkColors = [
                [99, 102, 241], [168, 85, 247], [6, 182, 212],
                [129, 140, 248], [192, 132, 252]
            ];
            const berryColors = [
                { body: [244, 63, 94], leaf: [74, 222, 128] },
                { body: [251, 113, 133], leaf: [134, 239, 172] },
                { body: [225, 29, 72], leaf: [34, 197, 94] }
            ];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function drawBerry(x, y, size, alpha, rot, col) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.globalAlpha = alpha;

                ctx.beginPath();
                ctx.moveTo(0, size * 0.9);
                ctx.bezierCurveTo(-size * 0.6, size * 0.3, -size * 0.5, -size * 0.3, 0, -size * 0.5);
                ctx.bezierCurveTo(size * 0.5, -size * 0.3, size * 0.6, size * 0.3, 0, size * 0.9);
                ctx.fillStyle = `rgb(${col.body[0]},${col.body[1]},${col.body[2]})`;
                ctx.shadowColor = `rgba(${col.body[0]},${col.body[1]},${col.body[2]},0.4)`;
                ctx.shadowBlur = size * 0.8;
                ctx.fill();

                ctx.shadowBlur = 0;
                const s = size * 0.12;
                ctx.fillStyle = `rgba(255,255,255,0.35)`;
                [[-s*1.2, 0], [s*1.2, 0], [0, size*0.35], [-s*1.5, size*0.4], [s*1.5, size*0.4]].forEach(([sx, sy]) => {
                    ctx.beginPath(); ctx.arc(sx, sy, s, 0, Math.PI * 2); ctx.fill();
                });

                ctx.beginPath();
                ctx.moveTo(0, -size * 0.5);
                ctx.quadraticCurveTo(-size * 0.4, -size * 0.9, -size * 0.15, -size * 0.85);
                ctx.moveTo(0, -size * 0.5);
                ctx.quadraticCurveTo(size * 0.4, -size * 0.9, size * 0.15, -size * 0.85);
                ctx.strokeStyle = `rgb(${col.leaf[0]},${col.leaf[1]},${col.leaf[2]})`;
                ctx.lineWidth = size * 0.12;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.globalAlpha = 1;
                ctx.restore();
            }

            for (let i = 0; i < 10; i++) {
                berries.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    baseSize: Math.random() * 10 + 4,
                    size: 0,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: Math.random() * 0.25 + 0.08,
                    rot: Math.random() * Math.PI * 2,
                    rotV: (Math.random() - 0.5) * 0.008,
                    baseAlpha: Math.random() * 0.15 + 0.05,
                    alpha: 0,
                    breathPhase: Math.random() * Math.PI * 2,
                    col: berryColors[Math.floor(Math.random() * berryColors.length)],
                    type: 'ambient'
                });
            }

            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const starCount = isMobile ? 20 : 45;
            const maxParticles = isMobile ? 100 : 250;
            const maxMouseBerries = isMobile ? 15 : 30;

            let stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    r: Math.random() * 1.5 + 0.3,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.02 + 0.008,
                    color: sparkColors[Math.floor(Math.random() * sparkColors.length)]
                });
            }

            let moveCounter = 0;
            let idleFrame = 0;
            let frame = 0;

            function spawnAtPointer(x, y) {
                mouse.x = x;
                mouse.y = y;
                moveCounter++;
                const spawnCount = isMobile ? 1 : 2;
                for (let i = 0; i < spawnCount; i++) {
                    const c = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                    particles.push({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5 - 0.5,
                        r: Math.random() * 2.5 + 0.8,
                        color: c,
                        life: 1
                    });
                }
                const berryFreq = isMobile ? 8 : 12;
                if (moveCounter % berryFreq === 0) {
                    berries.push({
                        x: x + (Math.random() - 0.5) * 30,
                        y: y + (Math.random() - 0.5) * 30,
                        size: Math.random() * 6 + 4,
                        baseSize: 0,
                        vx: (Math.random() - 0.5) * 1,
                        vy: -Math.random() * 1.5 - 0.5,
                        rot: Math.random() * Math.PI * 2,
                        rotV: (Math.random() - 0.5) * 0.03,
                        life: 1,
                        col: berryColors[Math.floor(Math.random() * berryColors.length)],
                        type: 'mouse'
                    });
                }
            }

            document.addEventListener('mousemove', (e) => spawnAtPointer(e.clientX, e.clientY));
            document.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t) spawnAtPointer(t.clientX, t.clientY);
            }, { passive: true });
            document.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                if (t) spawnAtPointer(t.clientX, t.clientY);
            }, { passive: true });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                idleFrame++;
                frame++;

                glowPos.x += (mouse.x - glowPos.x) * 0.06;
                glowPos.y += (mouse.y - glowPos.y) * 0.06;

                for (let i = 0; i < stars.length; i++) {
                    const st = stars[i];
                    st.phase += st.speed;
                    const twinkle = (Math.sin(st.phase) + 1) / 2;
                    const a = twinkle * 0.4 + 0.05;
                    ctx.beginPath();
                    ctx.arc(st.x, st.y, st.r * (0.8 + twinkle * 0.4), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${st.color[0]},${st.color[1]},${st.color[2]},${a})`;
                    ctx.fill();
                }

                if (!isMobile) {
                    for (let i = 0; i < stars.length; i++) {
                        for (let j = i + 1; j < stars.length; j++) {
                            const dx = stars[i].x - stars[j].x;
                            const dy = stars[i].y - stars[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < LINK_DIST) {
                                const lineAlpha = (1 - dist / LINK_DIST) * 0.08;
                                ctx.beginPath();
                                ctx.moveTo(stars[i].x, stars[i].y);
                                ctx.lineTo(stars[j].x, stars[j].y);
                                ctx.strokeStyle = `rgba(129,140,248,${lineAlpha})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                }

                if (idleFrame % 90 === 0) {
                    const c = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: -Math.random() * 0.4 - 0.1,
                        r: Math.random() * 2 + 1,
                        color: c,
                        life: 1
                    });
                }

                if (glowPos.x > 0) {
                    const r = 130;
                    const grd = ctx.createRadialGradient(glowPos.x, glowPos.y, 0, glowPos.x, glowPos.y, r);
                    grd.addColorStop(0, 'rgba(244,63,94,0.04)');
                    grd.addColorStop(0.4, 'rgba(99,102,241,0.025)');
                    grd.addColorStop(0.7, 'rgba(168,85,247,0.015)');
                    grd.addColorStop(1, 'transparent');
                    ctx.fillStyle = grd;
                    ctx.fillRect(glowPos.x - r, glowPos.y - r, r * 2, r * 2);
                }

                for (let i = berries.length - 1; i >= 0; i--) {
                    const b = berries[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.rot += b.rotV;

                    if (b.type === 'mouse') {
                        b.life -= 0.012;
                        b.vy += 0.01;
                        if (b.life <= 0) { berries.splice(i, 1); continue; }
                        drawBerry(b.x, b.y, b.size, b.life * 0.5, b.rot, b.col);
                    } else {
                        b.breathPhase += 0.015;
                        const breathVal = Math.sin(b.breathPhase);
                        b.size = b.baseSize * (1 + breathVal * 0.12);
                        b.alpha = b.baseAlpha * (1 + breathVal * 0.3);
                        if (b.y > canvas.height + 20) { b.y = -20; b.x = Math.random() * canvas.width; }
                        if (b.x < -20 || b.x > canvas.width + 20) b.vx *= -1;
                        drawBerry(b.x, b.y, b.size, b.alpha, b.rot, b.col);
                    }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.015;
                    p.r *= 0.995;
                    if (p.life <= 0) { particles.splice(i, 1); continue; }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life * 0.6})`;
                    ctx.shadowColor = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life * 0.3})`;
                    ctx.shadowBlur = 6;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;

                if (particles.length > maxParticles) particles.splice(0, particles.length - maxParticles);
                if (berries.length > (isMobile ? 25 : 40)) {
                    const mouseB = berries.filter(b => b.type === 'mouse');
                    if (mouseB.length > maxMouseBerries) berries.splice(berries.indexOf(mouseB[0]), 1);
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        async function loadConfig() {
            const params = new URLSearchParams(window.location.search);
            let config = {};
            try {
                const res = await fetch(`./config.json?v=${Date.now()}`, { cache: 'no-store' });
                config = await res.json();
            } catch (_) {}
            for (const [id, entry] of Object.entries(config)) {
                const paramUrl = params.get(id);
                if (paramUrl && paramUrl.startsWith('http')) entry.url = paramUrl;
            }
            return config;
        }

        function renderCards(config, container, stagger) {
            container.innerHTML = '';
            let hasActive = false;
            let i = 0;
            for (const [id, entry] of Object.entries(config)) {
                if (entry.url && (entry.url.startsWith('http') || entry.url.startsWith('./'))) hasActive = true;
                const card = createCard(id, entry);
                if (stagger) {
                    card.classList.add('card-enter');
                    card.style.animationDelay = `${i * 120}ms`;
                }
                container.appendChild(card);
                i++;
            }
            if (hasActive) document.getElementById('config-badge').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initParticles();
            startQuoteCarousel();

            const berryIcon = document.getElementById('berry-icon');
            berryIcon.addEventListener('click', () => {
                berryIcon.classList.remove('pulse');
                void berryIcon.offsetWidth;
                berryIcon.classList.add('pulse');
                setTimeout(() => berryIcon.classList.remove('pulse'), 500);
            });

            const container = document.getElementById('card-container');
            const config = await loadConfig();

            if (document.fonts && document.fonts.ready) await document.fonts.ready;

            document.body.classList.remove('loading');
            document.body.classList.add('ready');
            renderCards(config, container, true);

            setInterval(async () => {
                const fresh = await loadConfig();
                renderCards(fresh, container, false);
            }, 30000);
        });
    </script>
</body>
</html>
