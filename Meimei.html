<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莓莓知识库引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            safelist: [
                'bg-rose-500/10', 'bg-rose-500', 'border-rose-500/20', 'text-rose-400',
                'bg-purple-500/10', 'bg-purple-500', 'border-purple-500/20', 'text-purple-400',
                'bg-cyan-500/10', 'bg-cyan-500', 'border-cyan-500/20', 'text-cyan-400',
                'group-hover:bg-rose-500', 'group-hover:bg-purple-500', 'group-hover:bg-cyan-500'
            ]
        };
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .ai-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: rgba(99, 102, 241, 0.5);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .status-dot {
            animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center p-3 relative">

    <div class="bg-grid"></div>

    <header class="text-center mb-6 w-full max-w-4xl relative z-10 mt-4">
        <div class="inline-flex items-center justify-center p-2 bg-indigo-500/10 rounded-2xl mb-2 border border-indigo-500/20 text-indigo-400">
            <svg width="1.5em" height="1.5em" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
                <path d="M128 232 C80 192 48 144 48 96 C48 68 72 48 104 48 L152 48 C184 48 208 68 208 96 C208 144 176 192 128 232Z"/>
                <path d="M104 48 C96 28 76 20 64 16"/><path d="M152 48 C160 28 180 20 192 16"/><path d="M128 48 L128 12"/>
                <circle cx="112" cy="108" r="6" fill="currentColor" stroke="none"/>
                <circle cx="144" cy="108" r="6" fill="currentColor" stroke="none"/>
                <circle cx="128" cy="140" r="6" fill="currentColor" stroke="none"/>
                <circle cx="104" cy="156" r="6" fill="currentColor" stroke="none"/>
                <circle cx="152" cy="156" r="6" fill="currentColor" stroke="none"/>
                <circle cx="128" cy="188" r="6" fill="currentColor" stroke="none"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-1 tracking-tight text-white">
            莓莓知识库中枢
        </h1>
        <div id="config-badge" class="hidden inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[9px] uppercase tracking-widest">
            <i class="ph ph-check-circle"></i> 动态链接已加载
        </div>
    </header>

    <p id="quote" class="text-[11px] text-slate-500 italic tracking-wide max-w-md text-center mb-4 relative z-10 px-4"></p>

    <main id="card-container" class="w-full max-w-md flex flex-col gap-3 relative z-10 px-2"></main>

    <footer class="fixed bottom-3 left-0 right-0 text-center z-10">
        <p class="text-[10px] text-slate-600 tracking-wider">The only true wisdom is in knowing you know nothing.</p>
    </footer>

    <script>
        function createCard(id, { name, url, updatedAt, icon, color }) {
            const isActive = url && (url.startsWith('http') || url.startsWith('./'));
            const card = document.createElement('a');
            card.href = isActive ? url : 'javascript:void(0)';
            card.target = '_blank';
            card.className = 'ai-card glass-panel rounded-xl p-5 group flex items-center gap-4';

            if (!isActive) {
                card.addEventListener('click', () => alert(`「${name}」的知识库链接尚未配置`));
            }

            const dotClass = isActive
                ? `w-1.5 h-1.5 rounded-full bg-${color}-500 status-dot`
                : 'w-1.5 h-1.5 rounded-full bg-slate-600';
            const statusText = isActive ? 'Active / Ready' : 'Offline';
            const statusColor = isActive ? 'text-emerald-400' : 'text-slate-500';
            const timeInfo = isActive && updatedAt
                ? `<span class="text-[9px] text-slate-500 ml-1.5">${updatedAt}</span>`
                : '';

            card.innerHTML = `
                <div class="p-3 bg-${color}-500/10 rounded-lg border border-${color}-500/20 text-${color}-400 group-hover:bg-${color}-500 group-hover:text-white transition-all">
                    <i class="ph ${icon} text-xl"></i>
                </div>
                <div class="flex-grow">
                    <h2 class="font-bold text-white text-lg">${name}</h2>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="${dotClass}"></span>
                        <span class="text-[10px] ${statusColor} font-mono uppercase tracking-tighter">${statusText}</span>
                        ${timeInfo}
                    </div>
                </div>
                <i class="ph ph-caret-right text-slate-600 group-hover:text-white transition-colors"></i>`;

            return card;
        }

        const quotes = [
            '知识是灵魂的食粮。 -- 柏拉图',
            '我思故我在。 -- 笛卡尔',
            '未经审视的人生不值得过。 -- 苏格拉底',
            '知之为知之，不知为不知，是知也。 -- 孔子',
            '人是万物的尺度。 -- 普罗泰戈拉',
            '吾生也有涯，而知也无涯。 -- 庄子',
            '世界是我的表象。 -- 叔本华',
            '他人即地狱。 -- 萨特',
            '凡不能毁灭我的，必使我强大。 -- 尼采',
            '学而不思则罔，思而不学则殆。 -- 孔子'
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
            const container = document.getElementById('card-container');
            const params = new URLSearchParams(window.location.search);

            let config = {};
            try {
                const res = await fetch(`./config.json?v=${Date.now()}`, { cache: 'no-store' });
                config = await res.json();
            } catch (_) { /* config.json 不可用时静默降级 */ }

            for (const [id, entry] of Object.entries(config)) {
                const paramUrl = params.get(id);
                if (paramUrl && paramUrl.startsWith('http')) {
                    entry.url = paramUrl;
                }
            }

            let hasActive = false;
            for (const [id, entry] of Object.entries(config)) {
                if (entry.url && (entry.url.startsWith('http') || entry.url.startsWith('./'))) hasActive = true;
                container.appendChild(createCard(id, entry));
            }

            if (hasActive) {
                document.getElementById('config-badge').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
