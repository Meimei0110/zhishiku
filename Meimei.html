<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

        tailwind.config = {
            safelist: [
                'bg-rose-500/10', 'bg-rose-500', 'border-rose-500/20', 'text-rose-400',
                'bg-purple-500/10', 'bg-purple-500', 'border-purple-500/20', 'text-purple-400',
                'bg-cyan-500/10', 'bg-cyan-500', 'border-cyan-500/20', 'text-cyan-400',
                'group-hover:bg-rose-500', 'group-hover:bg-purple-500', 'group-hover:bg-cyan-500'
            ]
        };
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-height: 640px) {
            body { overflow-y: hidden; height: 100vh; }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .ai-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--card-glow, rgba(99,102,241,0.3)),
                        0 0 40px var(--card-glow-soft, rgba(99,102,241,0.1)),
                        0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: rgba(99, 102, 241, 0.5);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .status-dot {
            animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes icon-wiggle {
            0%, 100% { transform: rotate(0) translateX(0); }
            25% { transform: rotate(-6deg) translateX(-1px); }
            75% { transform: rotate(6deg) translateX(1px); }
        }
        @keyframes icon-tilt {
            0%, 100% { transform: rotate(0); }
            50% { transform: rotate(-8deg); }
        }
        @keyframes icon-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        @keyframes icon-wiggle-fast {
            0%, 100% { transform: rotate(0) scale(1.15); }
            25% { transform: rotate(-10deg) scale(1.15); }
            75% { transform: rotate(10deg) scale(1.15); }
        }
        @keyframes icon-stretch {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(1.2, 0.9); }
        }
        @keyframes icon-wag {
            0%, 100% { transform: translateY(0) rotate(0); }
            25% { transform: translateY(-4px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(0); }
            75% { transform: translateY(-4px) rotate(5deg); }
        }
        .icon-shrimp { animation: icon-wiggle 2s ease-in-out infinite; display: inline-block; }
        .icon-cat { animation: icon-tilt 3s ease-in-out infinite; display: inline-block; }
        .icon-dog { animation: icon-bounce 1.5s ease-in-out infinite; display: inline-block; }
        .ai-card:hover .icon-shrimp { animation: icon-wiggle-fast 0.4s ease-in-out infinite; }
        .ai-card:hover .icon-cat { animation: icon-stretch 0.6s ease-in-out infinite; }
        .ai-card:hover .icon-dog { animation: icon-wag 0.3s ease-in-out infinite; }

        @keyframes quote-in {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes quote-out {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-8px) scale(0.97); }
        }
        .quote-enter { animation: quote-in 0.6s ease-out forwards; }
        .quote-exit { animation: quote-out 0.4s ease-in forwards; }

        .quote-box {
            position: relative;
            transition: all 0.4s ease;
        }
        .quote-box::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1), rgba(6,182,212,0.15));
            z-index: -1;
            opacity: 0.5;
            transition: opacity 0.4s ease;
        }
        .quote-box:hover::before {
            opacity: 1;
        }
        .quote-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(99,102,241,0.15), 0 0 60px rgba(168,85,247,0.05);
        }
        .quote-box:hover .quote-text {
            color: #e2e8f0;
        }
        .quote-box:hover .quote-mark {
            color: rgba(129,140,248,0.5);
        }

        .ai-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: none;
        }
        .ai-card:hover::after {
            left: 150%;
            transition: left 0.6s ease;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        @keyframes berry-bounce {
            0% { transform: rotate(0) scale(1); }
            20% { transform: rotate(-8deg) scale(1.15); }
            40% { transform: rotate(6deg) scale(1.1); }
            60% { transform: rotate(-3deg) scale(1.05); }
            80% { transform: rotate(1deg) scale(1.02); }
            100% { transform: rotate(0) scale(1); }
        }
        @keyframes berry-pulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.25); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .header-icon {
            animation: breathe 3s ease-in-out infinite;
            cursor: pointer;
        }
        .header-icon:hover {
            animation: berry-bounce 0.7s ease forwards;
        }
        .header-icon.pulse {
            animation: berry-pulse 0.5s ease forwards;
        }

        @keyframes page-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes card-slide-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body.loading > *:not(canvas):not(.bg-grid):not(.glow-orb):not(#particle-canvas) {
            opacity: 0;
        }
        body.ready {
            animation: page-in 0.5s ease-out forwards;
        }
        .card-enter {
            animation: card-slide-in 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .shimmer-text {
            background: linear-gradient(90deg, #fff 0%, #818cf8 25%, #c084fc 50%, #22d3ee 75%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        .pwd-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .pwd-overlay.active { opacity: 1; pointer-events: auto; }
        .pwd-box {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 90%; max-width: 320px;
            text-align: center;
            transform: scale(0.92);
            transition: transform 0.25s ease;
        }
        .pwd-overlay.active .pwd-box { transform: scale(1); }
        .pwd-input {
            width: 100%; padding: 0.5rem 0.75rem; margin-top: 0.75rem;
            border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(15,23,42,0.8); color: #e2e8f0;
            font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        .pwd-input:focus { border-color: rgba(129,140,248,0.6); }
        .pwd-input.shake {
            animation: pwd-shake 0.4s ease;
            border-color: rgba(244,63,94,0.7);
        }
        @keyframes pwd-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .pwd-btn {
            margin-top: 0.75rem; padding: 0.45rem 1.5rem;
            border-radius: 0.5rem; border: none;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            color: white; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .pwd-btn:hover { opacity: 0.85; }
        .pwd-error { color: #f43f5e; font-size: 11px; margin-top: 0.4rem; min-height: 16px; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10px, -10px) scale(1.05); }
            66% { transform: translate(-5px, 8px) scale(0.98); }
        }
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
            animation: float 12s ease-in-out infinite;
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .glow-orb { display: none; }
            .quote-box { padding: 0.75rem 1rem; min-height: 52px !important; }
            .quote-box:hover { transform: none; }
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center p-3 relative loading">

    <canvas id="particle-canvas"></canvas>
    <div class="bg-grid"></div>
    <div class="glow-orb" style="width:300px;height:300px;top:10%;left:-5%;background:rgba(99,102,241,0.08);animation-delay:0s;"></div>

    <div id="quote-container" class="quote-box glass-panel w-full max-w-md relative z-10 px-4 sm:px-6 py-3 sm:py-4 mb-3 sm:mb-5 mx-2 rounded-2xl cursor-default" style="min-height: 56px;">

                <button id="pwd-confirm" class="pwd-btn">确认</button>

    <footer class="fixed bottom-2 sm:bottom-3 left-0 right-0 text-center z-10">
        <p class="text-[10px] text-slate-600 tracking-wider">Stay hungry, stay foolish. Build something people love.</p>

    <script>
        const ACCESS_PWD = 'caomeizuibang';
        let pwdUnlocked = false;

        function showPwdDialog(name, targetUrl) {
            const overlay = document.getElementById('pwd-overlay');
            const input = document.getElementById('pwd-input');
            const error = document.getElementById('pwd-error');
            document.getElementById('pwd-title').textContent = `进入「${name}」`;
            input.value = '';
            error.textContent = '';
            input.classList.remove('shake');
            overlay.classList.add('active');
            setTimeout(() => input.focus(), 200);

            return new Promise((resolve) => {
                function submit() {
                    if (input.value === ACCESS_PWD) {
                        overlay.classList.remove('active');
                        cleanup();
                        resolve(true);
                    } else {
                        error.textContent = '密码错误，请重试';
                        input.classList.remove('shake');
                        void input.offsetWidth;
                        input.classList.add('shake');
                        input.select();
                    }
                }
                function cancel() {
                    overlay.classList.remove('active');
                    cleanup();
                    resolve(false);
                }
                function onKey(e) {
                    if (e.key === 'Enter') submit();
                    if (e.key === 'Escape') cancel();
                }
                function cleanup() {
                    document.getElementById('pwd-confirm').removeEventListener('click', submit);
                    document.getElementById('pwd-cancel').removeEventListener('click', cancel);
                    input.removeEventListener('keydown', onKey);
                }
                document.getElementById('pwd-confirm').addEventListener('click', submit);
                document.getElementById('pwd-cancel').addEventListener('click', cancel);
                input.addEventListener('keydown', onKey);
            });
        }

        function createCard(id, { name, url, updatedAt, icon, color }) {
            const isActive = url && (url.startsWith('http') || url.startsWith('./'));
            const card = document.createElement('a');
            card.href = 'javascript:void(0)';
            card.className = 'ai-card glass-panel rounded-xl p-5 group flex items-center gap-4';

            const glowMap = { rose: '244,63,94', purple: '168,85,247', cyan: '6,182,212' };
            const glowRgb = glowMap[color] || '99,102,241';
            card.style.setProperty('--card-glow', `rgba(${glowRgb},0.3)`);
            card.style.setProperty('--card-glow-soft', `rgba(${glowRgb},0.1)`);

            const iconAnimMap = { 'ph-shrimp': 'icon-shrimp', 'ph-cat': 'icon-cat', 'ph-dog': 'icon-dog' };
            const iconAnim = iconAnimMap[icon] || '';

            card.addEventListener('click', async (e) => {
                e.preventDefault();
                if (!isActive) {
                    alert(`「${name}」的知识库链接尚未配置`);
                    return;
                }
                if (pwdUnlocked) {
                    window.open(url, '_blank');
                    return;
                }
                const ok = await showPwdDialog(name, url);
                if (ok) {
                    pwdUnlocked = true;
                    window.open(url, '_blank');
                }
            });

            const dotClass = isActive
                ? `w-1.5 h-1.5 rounded-full bg-${color}-500 status-dot`
                : 'w-1.5 h-1.5 rounded-full bg-slate-600';
            const statusText = isActive ? 'Active / Ready' : 'Offline';
            const statusColor = isActive ? 'text-emerald-400' : 'text-slate-500';
            let timeDisplay = '';
            if (isActive && updatedAt) {
                const icon_clock = '<i class="ph ph-clock text-[9px]"></i>';
                timeDisplay = `<span class="text-[9px] text-slate-500 ml-1.5 inline-flex items-center gap-0.5">${icon_clock} ${updatedAt}</span>`;
            }

            card.innerHTML = `
                <div class="p-3 bg-${color}-500/10 rounded-lg border border-${color}-500/20 text-${color}-400 group-hover:bg-${color}-500 group-hover:text-white transition-all">
                    <i class="ph ${icon} text-xl ${iconAnim}"></i>
                </div>
                <div class="flex-grow">
                    <h2 class="font-bold text-white text-lg">${name}</h2>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="${dotClass}"></span>
                        <span class="text-[10px] ${statusColor} font-mono uppercase tracking-tighter">${statusText}</span>
                        ${timeDisplay}
                    </div>
                </div>
                <i class="ph ph-caret-right text-slate-600 group-hover:text-white transition-colors"></i>`;

            return card;
        }

        const quotes = [
            '做正确的事，而非容易的事。',

            '别急，你正在成为更好的自己。',
            '未经审视的人生不值得过。 -- 苏格拉底',
            '万物皆流，无物常驻。 -- 赫拉克利特',
            '吾生也有涯，而知也无涯。 -- 庄子',
            '天行健，君子以自强不息。 -- 易经',
            '千里之行，始于足下。 -- 老子',
            '不畏浮云遮望眼，只缘身在最高层。 -- 王安石',
            '博观而约取，厚积而薄发。 -- 苏轼',
            '路漫漫其修远兮，吾将上下而求索。 -- 屈原',
            '生活不是等待暴风雨过去，而是学会在雨中跳舞。',
            '你无法控制风向，但可以调整帆的方向。',
            '最暗的夜，才能看到最亮的星。',
            '不是因为看到希望才坚持，而是坚持了才看到希望。',
            '与其羡慕别人的光芒，不如点亮自己的灯。',
            '想都是问题，做才是答案。',
            '人生没有白费的努力，也没有碰巧的成功。',
            '你的时间有限，别浪费在过别人的生活上。 -- 乔布斯',
            '简约不是少，而是没有多余。 -- 迪特·拉姆斯',
            '好的设计是尽可能少的设计。 -- 迪特·拉姆斯',
            '如果你定义了问题，你就已经解决了一半。 -- 查尔斯·凯特灵',
            '不要问用户想要什么，去观察他们做什么。',
            '产品是活的，永远没有完成的那天。',
            '删掉一个功能比加一个功能需要更大的勇气。',
            '细节不是细节，细节决定产品。 -- 查尔斯·伊姆斯',
            '最好的界面是没有界面。',
            '用户体验不是一个部门，而是整个公司的事。',
            '先做对，再做好，最后做快。',
            '每个Bug的背后都藏着一个没想到的场景。',
            '焦虑说明你在乎，迷茫说明你在思考。',
            '允许自己慢慢来，但不允许自己停下来。',
            '你不需要很厉害才能开始，但你需要开始才能变厉害。',
            '比昨天的自己好一点点，就够了。',
            '方向对了，慢一点也没关系。',
            '不要等到万事俱备，学会在不完美中启程。',
            '你以为的极限，只是别人的起点。继续走。',
            '困难是用来超越的，不是用来逃避的。',
            '命运给你一个低起点，是想看你如何翻盘。',
            '没有人天生就会，所有厉害都是练出来的。',
            '把每一天活成值得回忆的样子。',
            '人生最大的风险，就是从来不冒险。',
            '所有了不起的事情，都是由一群不服气的人做出来的。',
            '认真生活的人，运气都不会太差。',
            '温柔且有力量，谦逊且有锋芒。',
            '你的坚持终将美好。'
        ];

        function startQuoteCarousel() {
            const el = document.getElementById('quote');
            const box = document.getElementById('quote-container');
            let idx = Math.floor(Math.random() * quotes.length);
            let paused = false;
            el.textContent = quotes[idx];

            box.addEventListener('mouseenter', () => { paused = true; });
            box.addEventListener('mouseleave', () => { paused = false; });

            setInterval(() => {
                if (paused) return;
                el.classList.remove('quote-enter');
                el.classList.add('quote-exit');
                setTimeout(() => {
                    idx = (idx + 1) % quotes.length;
                    el.textContent = quotes[idx];
                    el.classList.remove('quote-exit');
                    el.classList.add('quote-enter');
                }, 400);
            }, 5000);
        }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let berries = [];
            let meteors = [];
            let mouse = { x: -100, y: -100 };
            let glowPos = { x: -100, y: -100 };
            const LINK_DIST = 120;
            const REPEL_DIST = 80;
            const sparkColors = [
                [99, 102, 241], [168, 85, 247], [6, 182, 212],
                [129, 140, 248], [192, 132, 252]
            ];
            const berryColors = [
                { body: [244, 63, 94], leaf: [74, 222, 128] },
                { body: [251, 113, 133], leaf: [134, 239, 172] },
                { body: [225, 29, 72], leaf: [34, 197, 94] }
            ];
            const auroraWaves = [
                { color: [99, 102, 241], amp: 18, freq: 0.003, speed: 0.008, yBase: 0.08 },
                { color: [168, 85, 247], amp: 14, freq: 0.004, speed: -0.006, yBase: 0.12 },
                { color: [6, 182, 212], amp: 20, freq: 0.0025, speed: 0.01, yBase: 0.16 }
            ];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function drawBerry(x, y, size, alpha, rot, col) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.globalAlpha = alpha;

                ctx.beginPath();
                ctx.moveTo(0, size * 0.9);
                ctx.bezierCurveTo(-size * 0.6, size * 0.3, -size * 0.5, -size * 0.3, 0, -size * 0.5);
                ctx.bezierCurveTo(size * 0.5, -size * 0.3, size * 0.6, size * 0.3, 0, size * 0.9);
                ctx.fillStyle = `rgb(${col.body[0]},${col.body[1]},${col.body[2]})`;
                ctx.shadowColor = `rgba(${col.body[0]},${col.body[1]},${col.body[2]},0.4)`;
                ctx.shadowBlur = size * 0.8;
                ctx.fill();

                ctx.shadowBlur = 0;
                const s = size * 0.12;
                ctx.fillStyle = `rgba(255,255,255,0.35)`;
                [[-s*1.2, 0], [s*1.2, 0], [0, size*0.35], [-s*1.5, size*0.4], [s*1.5, size*0.4]].forEach(([sx, sy]) => {
                    ctx.beginPath(); ctx.arc(sx, sy, s, 0, Math.PI * 2); ctx.fill();
                });

                ctx.beginPath();
                ctx.moveTo(0, -size * 0.5);
                ctx.quadraticCurveTo(-size * 0.4, -size * 0.9, -size * 0.15, -size * 0.85);
                ctx.moveTo(0, -size * 0.5);
                ctx.quadraticCurveTo(size * 0.4, -size * 0.9, size * 0.15, -size * 0.85);
                ctx.strokeStyle = `rgb(${col.leaf[0]},${col.leaf[1]},${col.leaf[2]})`;
                ctx.lineWidth = size * 0.12;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.globalAlpha = 1;
                ctx.restore();
            }

            for (let i = 0; i < 10; i++) {
                berries.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    baseSize: Math.random() * 10 + 4,
                    size: 0,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: Math.random() * 0.25 + 0.08,
                    rot: Math.random() * Math.PI * 2,
                    rotV: (Math.random() - 0.5) * 0.008,
                    baseAlpha: Math.random() * 0.15 + 0.05,
                    alpha: 0,
                    breathPhase: Math.random() * Math.PI * 2,
                    col: berryColors[Math.floor(Math.random() * berryColors.length)],
                    type: 'ambient'
                });
            }

            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const starCount = isMobile ? 20 : 45;
            const maxParticles = isMobile ? 100 : 250;
            const maxMouseBerries = isMobile ? 15 : 30;
            const maxMeteors = isMobile ? 1 : 2;

            let stars = [];
            for (let i = 0; i < starCount; i++) {
                const sx = Math.random() * window.innerWidth;
                const sy = Math.random() * window.innerHeight;
                stars.push({
                    x: sx, y: sy, originX: sx, originY: sy,
                    r: Math.random() * 1.5 + 0.3,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.02 + 0.008,
                    color: sparkColors[Math.floor(Math.random() * sparkColors.length)]
                });
            }

            let moveCounter = 0;
            let idleFrame = 0;
            let frame = 0;

            function spawnAtPointer(x, y) {
                mouse.x = x;
                mouse.y = y;
                moveCounter++;
                const spawnCount = isMobile ? 1 : 2;
                for (let i = 0; i < spawnCount; i++) {
                    const c = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                    particles.push({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5 - 0.5,
                        r: Math.random() * 2.5 + 0.8,
                        color: c,
                        life: 1
                    });
                }
                const berryFreq = isMobile ? 8 : 12;
                if (moveCounter % berryFreq === 0) {
                    berries.push({
                        x: x + (Math.random() - 0.5) * 30,
                        y: y + (Math.random() - 0.5) * 30,
                        size: Math.random() * 6 + 4,
                        baseSize: 0,
                        vx: (Math.random() - 0.5) * 1,
                        vy: -Math.random() * 1.5 - 0.5,
                        rot: Math.random() * Math.PI * 2,
                        rotV: (Math.random() - 0.5) * 0.03,
                        life: 1,
                        col: berryColors[Math.floor(Math.random() * berryColors.length)],
                        type: 'mouse'
                    });
                }
            }

            function clickBurst(x, y) {
                const count = isMobile ? 12 : 20;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
                    const speed = Math.random() * 3 + 1.5;
                    const c = (Math.random() < 0.5)
                        ? sparkColors[Math.floor(Math.random() * sparkColors.length)]
                        : berryColors[Math.floor(Math.random() * berryColors.length)].body;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        r: Math.random() * 3 + 1.5,
                        color: c,
                        life: 1
                    });
                }
            }

            document.addEventListener('mousemove', (e) => spawnAtPointer(e.clientX, e.clientY));
            document.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                if (t) spawnAtPointer(t.clientX, t.clientY);
            }, { passive: true });
            document.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                if (t) spawnAtPointer(t.clientX, t.clientY);
            }, { passive: true });

            document.addEventListener('click', (e) => {
                if (e.target.closest('.ai-card, .header-icon, .quote-box, a, button')) return;
                clickBurst(e.clientX, e.clientY);
            });

            function drawAurora() {
                for (const wave of auroraWaves) {
                    const baseY = canvas.height * wave.yBase;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    for (let x = 0; x <= canvas.width; x += 4) {
                        const y = baseY + Math.sin(x * wave.freq + frame * wave.speed) * wave.amp
                                       + Math.sin(x * wave.freq * 1.5 + frame * wave.speed * 0.7) * wave.amp * 0.5;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(canvas.width, 0);
                    ctx.closePath();
                    const grd = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.2);
                    grd.addColorStop(0, `rgba(${wave.color[0]},${wave.color[1]},${wave.color[2]},0.008)`);
                    grd.addColorStop(1, `rgba(${wave.color[0]},${wave.color[1]},${wave.color[2]},0.025)`);
                    ctx.fillStyle = grd;
                    ctx.fill();
                }
            }

            function spawnMeteor() {
                if (meteors.length >= maxMeteors) return;
                const angle = Math.PI * 0.2 + Math.random() * 0.15;
                meteors.push({
                    x: Math.random() * canvas.width * 0.7 + canvas.width * 0.15,
                    y: -10,
                    speed: Math.random() * 4 + 5,
                    angle,
                    tailLen: Math.random() * 60 + 40,
                    life: 1,
                    color: sparkColors[Math.floor(Math.random() * sparkColors.length)]
                });
            }

            function drawMeteors() {
                for (let i = meteors.length - 1; i >= 0; i--) {
                    const m = meteors[i];
                    m.x += Math.cos(m.angle) * m.speed;
                    m.y += Math.sin(m.angle) * m.speed;
                    m.life -= 0.018;
                    if (m.life <= 0 || m.x > canvas.width + 50 || m.y > canvas.height + 50) {
                        meteors.splice(i, 1); continue;
                    }
                    const tailX = m.x - Math.cos(m.angle) * m.tailLen;
                    const tailY = m.y - Math.sin(m.angle) * m.tailLen;
                    const grd = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
                    grd.addColorStop(0, `rgba(${m.color[0]},${m.color[1]},${m.color[2]},${m.life * 0.7})`);
                    grd.addColorStop(1, `rgba(${m.color[0]},${m.color[1]},${m.color[2]},0)`);
                    ctx.beginPath();
                    ctx.moveTo(m.x, m.y);
                    ctx.lineTo(tailX, tailY);
                    ctx.strokeStyle = grd;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${m.life * 0.8})`;
                    ctx.fill();
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                idleFrame++;
                frame++;

                glowPos.x += (mouse.x - glowPos.x) * 0.06;
                glowPos.y += (mouse.y - glowPos.y) * 0.06;

                drawAurora();

                if (frame % (isMobile ? 400 : 250) === 0) spawnMeteor();
                drawMeteors();

                for (let i = 0; i < stars.length; i++) {
                    const st = stars[i];

                    if (!isMobile && mouse.x > 0) {
                        const dx = st.x - mouse.x;
                        const dy = st.y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < REPEL_DIST && dist > 0) {
                            const force = (1 - dist / REPEL_DIST) * 3;
                            st.x += (dx / dist) * force;
                            st.y += (dy / dist) * force;
                        }
                    }
                    st.x += (st.originX - st.x) * 0.02;
                    st.y += (st.originY - st.y) * 0.02;

                    st.phase += st.speed;
                    const twinkle = (Math.sin(st.phase) + 1) / 2;
                    const a = twinkle * 0.4 + 0.05;
                    ctx.beginPath();
                    ctx.arc(st.x, st.y, st.r * (0.8 + twinkle * 0.4), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${st.color[0]},${st.color[1]},${st.color[2]},${a})`;
                    ctx.fill();
                }

                if (!isMobile) {
                    for (let i = 0; i < stars.length; i++) {
                        for (let j = i + 1; j < stars.length; j++) {
                            const dx = stars[i].x - stars[j].x;
                            const dy = stars[i].y - stars[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < LINK_DIST) {
                                const lineAlpha = (1 - dist / LINK_DIST) * 0.08;
                                ctx.beginPath();
                                ctx.moveTo(stars[i].x, stars[i].y);
                                ctx.lineTo(stars[j].x, stars[j].y);
                                ctx.strokeStyle = `rgba(129,140,248,${lineAlpha})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                }

                if (idleFrame % 90 === 0) {
                    const c = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: -Math.random() * 0.4 - 0.1,
                        r: Math.random() * 2 + 1,
                        color: c,
                        life: 1
                    });
                }

                if (glowPos.x > 0) {
                    const r = 130;
                    const grd = ctx.createRadialGradient(glowPos.x, glowPos.y, 0, glowPos.x, glowPos.y, r);
                    grd.addColorStop(0, 'rgba(244,63,94,0.04)');
                    grd.addColorStop(0.4, 'rgba(99,102,241,0.025)');
                    grd.addColorStop(0.7, 'rgba(168,85,247,0.015)');
                    grd.addColorStop(1, 'transparent');
                    ctx.fillStyle = grd;
                    ctx.fillRect(glowPos.x - r, glowPos.y - r, r * 2, r * 2);
                }

                for (let i = berries.length - 1; i >= 0; i--) {
                    const b = berries[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.rot += b.rotV;

                    if (b.type === 'mouse') {
                        b.life -= 0.012;
                        b.vy += 0.01;
                        if (b.life <= 0) { berries.splice(i, 1); continue; }
                        drawBerry(b.x, b.y, b.size, b.life * 0.5, b.rot, b.col);
                    } else {
                        b.breathPhase += 0.015;
                        const breathVal = Math.sin(b.breathPhase);
                        b.size = b.baseSize * (1 + breathVal * 0.12);
                        b.alpha = b.baseAlpha * (1 + breathVal * 0.3);
                        if (b.y > canvas.height + 20) { b.y = -20; b.x = Math.random() * canvas.width; }
                        if (b.x < -20 || b.x > canvas.width + 20) b.vx *= -1;
                        drawBerry(b.x, b.y, b.size, b.alpha, b.rot, b.col);
                    }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.008;
                    p.life -= 0.015;
                    p.r *= 0.995;
                    if (p.life <= 0) { particles.splice(i, 1); continue; }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life * 0.6})`;
                    ctx.shadowColor = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life * 0.3})`;
                    ctx.shadowBlur = 6;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;

                if (particles.length > maxParticles) particles.splice(0, particles.length - maxParticles);
                if (berries.length > (isMobile ? 25 : 40)) {
                    const mouseB = berries.filter(b => b.type === 'mouse');
                    if (mouseB.length > maxMouseBerries) berries.splice(berries.indexOf(mouseB[0]), 1);
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        async function loadConfig() {
            const params = new URLSearchParams(window.location.search);
            let config = {};
            try {
                const res = await fetch(`./config.json?v=${Date.now()}`, { cache: 'no-store' });
                config = await res.json();
            } catch (_) {}
            for (const [id, entry] of Object.entries(config)) {
                const paramUrl = params.get(id);
                if (paramUrl && paramUrl.startsWith('http')) entry.url = paramUrl;
            }
            return config;
        }

        function renderCards(config, container, stagger) {
            container.innerHTML = '';
            let hasActive = false;
            let i = 0;
            for (const [id, entry] of Object.entries(config)) {
                if (entry.url && (entry.url.startsWith('http') || entry.url.startsWith('./'))) hasActive = true;
                const card = createCard(id, entry);
                if (stagger) {
                    card.classList.add('card-enter');
                    card.style.animationDelay = `${i * 120}ms`;
                }
                container.appendChild(card);
                i++;
            }
            if (hasActive) document.getElementById('config-badge').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initParticles();
            startQuoteCarousel();

            const berryIcon = document.getElementById('berry-icon');
            berryIcon.addEventListener('click', () => {
                berryIcon.classList.remove('pulse');
                void berryIcon.offsetWidth;
                berryIcon.classList.add('pulse');
                setTimeout(() => berryIcon.classList.remove('pulse'), 500);
            });

            const container = document.getElementById('card-container');
            const config = await loadConfig();

            if (document.fonts && document.fonts.ready) await document.fonts.ready;

            document.body.classList.remove('loading');
            document.body.classList.add('ready');
            renderCards(config, container, true);

            setInterval(async () => {
                const fresh = await loadConfig();
                renderCards(fresh, container, false);
            }, 30000);
        });
    </script>
